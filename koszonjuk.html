<!doctype html>
<html lang="hu">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Köszönjük! — Fekete Sárkány Kyokushin Karate</title>
<meta name="robots" content="noindex"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:#0c0c0c;
  color:#e4e0db;
  font-family:"Inter",system-ui,sans-serif;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:100svh;
  padding:2rem 1.5rem;
  text-align:center;
  -webkit-font-smoothing:antialiased;
}
:root{--red:#c8102e}
.display{font-family:"Barlow Condensed",Impact,sans-serif;font-weight:900;text-transform:uppercase}
.label{font-family:"Inter",sans-serif;font-size:11px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:rgba(228,224,219,.42)}

/* animated check */
@keyframes circleIn{from{stroke-dashoffset:283}to{stroke-dashoffset:0}}
@keyframes checkIn{from{stroke-dashoffset:50}to{stroke-dashoffset:0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

.check-circle circle{
  stroke-dasharray:283;
  stroke-dashoffset:283;
  animation:circleIn .7s .1s cubic-bezier(.4,0,.2,1) forwards;
}
.check-circle path{
  stroke-dasharray:50;
  stroke-dashoffset:50;
  animation:checkIn .45s .75s ease forwards;
}
.fade-1{opacity:0;animation:fadeUp .7s .5s ease forwards}
.fade-2{opacity:0;animation:fadeUp .7s .7s ease forwards}
.fade-3{opacity:0;animation:fadeUp .7s .9s ease forwards}
.fade-4{opacity:0;animation:fadeUp .7s 1.1s ease forwards}

.phone-link{
  display:inline-flex;align-items:center;gap:.75rem;
  font-family:"Barlow Condensed",sans-serif;font-weight:900;
  font-size:clamp(1.8rem,6vw,2.8rem);letter-spacing:.02em;
  color:#fff;text-decoration:none;
  border:1.5px solid var(--red);
  padding:.85rem 2rem;
  margin-top:1.5rem;
  transition:background .2s,box-shadow .2s;
}
.phone-link:hover{background:var(--red);box-shadow:0 4px 24px rgba(200,16,46,.4)}

.back-link{
  display:inline-flex;align-items:center;gap:.4rem;
  font-family:"Barlow Condensed",sans-serif;font-weight:600;
  font-size:.95rem;letter-spacing:.1em;text-transform:uppercase;
  color:rgba(228,224,219,.38);text-decoration:none;
  margin-top:2.5rem;transition:color .2s;
}
.back-link:hover{color:rgba(228,224,219,.75)}
</style>
</head>
<body>

<div style="max-width:540px;width:100%">

  <!-- Animated check -->
  <div class="fade-1" style="margin-bottom:2rem">
    <svg class="check-circle" width="72" height="72" viewBox="0 0 96 96"
      fill="none" xmlns="http://www.w3.org/2000/svg"
      style="display:block;margin:0 auto">
      <circle cx="48" cy="48" r="45" stroke="var(--red)" stroke-width="2.5"
        fill="none"/>
      <path d="M28 48l14 14 26-26" stroke="var(--red)" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>
  </div>

  <!-- Label -->
  <div class="fade-1" style="display:flex;align-items:center;justify-content:center;
    gap:.75rem;margin-bottom:1.25rem">
    <span style="width:22px;height:1px;background:var(--red);display:inline-block"></span>
    <span class="label">Megkaptuk az üzeneted</span>
    <span style="width:22px;height:1px;background:var(--red);display:inline-block"></span>
  </div>

  <!-- Headline -->
  <h1 class="display fade-2"
    style="font-size:clamp(3rem,10vw,5.5rem);color:#fff;line-height:.9;margin-bottom:1.25rem">
    Köszönjük!
  </h1>

  <p class="fade-3"
    style="font-size:1.05rem;color:rgba(228,224,219,.75);line-height:1.65;margin-bottom:.5rem">
    Hamarosan felvesszük veled a kapcsolatot.<br>
    Ha nem akarsz várni — hívj most.
  </p>

  <!-- Phone — primary action -->
  <div class="fade-3">
    <a href="tel:+36302258501" class="phone-link">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
        stroke="var(--red)" stroke-width="2">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.4a16 16 0 0 0 6.29 6.29l.86-.87a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      +36 30 225 8501
    </a>
  </div>

  <!-- OSU -->
  <div class="fade-4" style="margin-top:3rem;font-family:'Barlow Condensed',sans-serif;
    font-weight:900;font-size:clamp(2rem,7vw,4rem);color:transparent;letter-spacing:.1em;
    -webkit-text-stroke:1px rgba(200,16,46,.22)">
    OSU!
  </div>

  <a href="/" class="back-link fade-4">
    ← Vissza a főoldalra
  </a>

</div>

</body>
</html>
